<body data-page="doctors">
<div class="layout">
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon"><i class="fa-solid fa-hospital-user" style="color:white"></i></div><div><h1>MediCore</h1><span>Hospital Management</span></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section"><div class="nav-section-title">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-grip"></i></span> Dashboard</a>
      <a href="appointments.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-calendar-check"></i></span> Appointments <span class="nav-badge">5</span></a>
      <a href="patients.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Patients</a>
      <a href="doctors.html" class="nav-item active"><span class="nav-icon"><i class="fa-solid fa-user-doctor"></i></span> Doctors</a>
      <a href="departments.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-building-columns"></i></span> Departments</a>
    </div>
    <div class="nav-section"><div class="nav-section-title">Clinical</div>
      <a href="medical-records.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-file-medical"></i></span> Medical Records</a>
      <a href="laboratory.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-flask-vial"></i></span> Laboratory</a>
      <a href="pharmacy.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-pills"></i></span> Pharmacy</a>
      <a href="rooms.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-bed"></i></span> Rooms & Wards</a>
      <a href="emergency.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-truck-medical"></i></span> Emergency</a>
    </div>
    <div class="nav-section"><div class="nav-section-title">Administration</div>
      <a href="staff.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-id-badge"></i></span> Staff</a>
      <a href="billing.html" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-file-invoice-dollar"></i></span> Billing</a>

    </div>
  </nav>
  <div class="sidebar-footer"><a href="my-profile.html" class="sidebar-user"><img id="sidebarAvatar" src="https://ui-avatars.com/api/?name=Dr+Admin&background=2563eb&color=fff" alt=""/><div class="user-info"><div class="user-name" id="sidebarName">Dr. Admin</div><div class="user-role" id="sidebarRole">Administrator</div></div></a></div>
</aside>
<div class="main-content">
  <header class="header">
    <button class="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
    <div class="header-left"><div class="header-title">Doctors</div><div class="header-subtitle">148 registered physicians</div></div>
    <div class="header-search"><i class="fa-solid fa-magnifying-glass search-icon"></i><input type="text" placeholder="Search doctors..."/></div>
    <div class="header-actions">
      <a href="notifications.html" class="header-btn"><i class="fa-solid fa-bell"></i></a>
      <a href="my-profile.html"><img src="https://ui-avatars.com/api/?name=Dr+Admin&background=2563eb&color=fff" class="header-avatar" alt=""/></a>
    </div>
  </header>
  <div class="page-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm">All Departments</button>
        <button class="btn btn-ghost btn-sm">Cardiology</button>
        <button class="btn btn-ghost btn-sm">Neurology</button>
        <button class="btn btn-ghost btn-sm">Orthopedics</button>
        <button class="btn btn-ghost btn-sm">Pediatrics</button>
        <button class="btn btn-ghost btn-sm">Dermatology</button>
      </div>
      <button class="btn btn-primary" data-modal="addDoctorModal"><i class="fa-solid fa-plus"></i> Add Doctor</button>
    </div>
    <div class="grid-auto" id="doctorsGrid"></div>
  </div>
</div>
</div>
<!-- ADD DOCTOR MODAL -->
<div class="modal-overlay" id="addDoctorModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Add New Doctor</div><button class="modal-close"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" placeholder="First name"/></div><div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" placeholder="Last name"/></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Specialty</label><select class="form-control"><option>Cardiology</option><option>Neurology</option><option>Orthopedics</option><option>Pediatrics</option></select></div><div class="form-group"><label class="form-label">Years of Experience</label><input type="number" class="form-control" placeholder="Years"/></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-control" placeholder="+1 (555) 000-0000"/></div><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="doctor@medicore.com"/></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost modal-close">Cancel</button><button class="btn btn-primary" onclick="window.showToast('Doctor added!');document.getElementById('addDoctorModal').classList.remove('active')"><i class="fa-solid fa-check"></i> Add Doctor</button></div>
  </div>
</div>
<script src="../js/data.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/app.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
