<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCore HMS — Nursing</title>
<link rel="stylesheet" href="../css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon"><i class="fa-solid fa-hospital-user" style="color:white"></i></div><div><h1>MediCore</h1><span>Hospital Management</span></div></div>
  <nav class="sidebar-nav"></nav>
  <div class="sidebar-footer"><a href="my-profile.html" class="sidebar-user"><img id="sidebarAvatar" src="" alt=""/><div class="user-info"><div class="user-name" id="sidebarName">User</div><div class="user-role" id="sidebarRole">Role</div></div></a></div>
</aside>
<div class="main-content">
  <header class="header">
    <button class="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
    <div class="header-left"><div class="header-title">Nursing Station</div><div class="header-subtitle">Vitals, MAR & nursing notes</div></div>
    <div class="header-search"><i class="fa-solid fa-magnifying-glass search-icon"></i><input type="text" id="tableSearch" placeholder="Search notes..."/></div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
      <a href="my-profile.html"><img id="headerAvatar" class="header-avatar" alt=""/></a>
    </div>
  </header>
  <div class="page-content">
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
      <div class="stat-card"><div class="stat-icon blue"><i class="fa-solid fa-heart-pulse"></i></div><div class="stat-info"><div class="stat-value" id="statVitals">0</div><div class="stat-label">Vitals Logged Today</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fa-solid fa-pills"></i></div><div class="stat-info"><div class="stat-value" id="statMeds">0</div><div class="stat-label">Medications Given</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow"><i class="fa-solid fa-bed"></i></div><div class="stat-info"><div class="stat-value" id="statAdmitted">0</div><div class="stat-label">Patients Under Care</div></div></div>
    </div>
    <div class="grid-2" style="align-items:start;">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Nursing Notes & MAR</div>
          <button class="btn btn-primary btn-sm" data-modal="noteModal"><i class="fa-solid fa-plus"></i> Add Note</button>
        </div>
        <div class="card-body no-pad">
          <div class="table-wrap"><table><thead><tr><th>Time</th><th>Patient</th><th>Type</th><th>Vitals</th><th>Nurse</th><th>Notes</th></tr></thead>
          <tbody id="notesBody"></tbody></table></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Admitted Patients — Quick Vitals</div></div>
        <div class="card-body" id="vitalsPanel"></div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title"><i class="fa-solid fa-user-nurse" style="color:var(--primary);margin-right:8px;"></i>Add Nursing Note</div><button class="modal-close"><i class="fa-solid fa-xmark"></i></button></div>
    <form id="noteForm">
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Patient</label><select class="form-control" name="patientId" id="notePatient" required></select></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Type</label><select class="form-control" name="type"><option>Vitals</option><option>Medication</option><option>Assessment</option><option>Incident</option></select></div>
          <div class="form-group"><label class="form-label">Vitals (if applicable)</label><input type="text" class="form-control" name="vitals" placeholder="BP 120/80, HR 72"/></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="3" required></textarea></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-ghost modal-close">Cancel</button><button type="submit" class="btn btn-primary">Save Note</button></div>
    </form>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/app.js"></script>
<script src="../js/main.js"></script>
<script>
function renderNotes() {
  const notes = HMSData.get('nursingNotes');
  document.getElementById('statVitals').textContent = notes.filter(n => n.type === 'Vitals').length;
  document.getElementById('statMeds').textContent = notes.filter(n => n.type === 'Medication').length;
  document.getElementById('statAdmitted').textContent = HMSData.get('admissions').filter(a => a.status !== 'Discharged').length;
  document.getElementById('notesBody').innerHTML = notes.map(n => `<tr>
    <td style="font-size:0.8rem;">${n.time}</td><td>${n.patient}</td>
    <td><span class="badge badge-info">${n.type}</span></td><td>${n.vitals || '—'}</td><td>${n.nurse}</td><td style="max-width:200px;font-size:0.825rem;">${n.notes}</td></tr>`).join('');
}

function renderVitalsPanel() {
  const admitted = HMSData.get('admissions').filter(a => a.status !== 'Discharged');
  document.getElementById('vitalsPanel').innerHTML = admitted.length ? admitted.map(a => {
    const p = HMSData.find('patients', a.patientId);
    const v = p?.vitals || {};
    return `<div style="padding:14px;border:1px solid var(--gray-200);border-radius:10px;margin-bottom:12px;">
      <div style="font-weight:600;margin-bottom:8px;">${a.patient} <span class="badge badge-primary" style="font-size:0.7rem;">${a.room}</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.8rem;">
        <div>BP: <strong>${v.bp || '—'}</strong></div><div>HR: <strong>${v.hr || '—'}</strong></div>
        <div>Temp: <strong>${v.temp || '—'}</strong></div><div>SpO2: <strong>${v.spo2 || '—'}</strong></div>
      </div>
      <button class="btn btn-outline btn-sm" style="margin-top:10px;width:100%;" onclick="logVitals('${a.patientId}','${a.patient}')">Update Vitals</button>
    </div>`;
  }).join('') : '<div class="empty-state"><i class="fa-solid fa-bed"></i><p>No admitted patients</p></div>';
}

function logVitals(patientId, patient) {
  const bp = prompt('Blood Pressure (e.g. 120/80):');
  if (!bp) return;
  const hr = prompt('Heart Rate (e.g. 72 bpm):') || '—';
  HMSData.update('patients', patientId, { vitals: { bp, hr, temp: '98.6°F', spo2: '98%' } });
  const user = JSON.parse(sessionStorage.getItem('hms_user') || '{}');
  HMSData.add('nursingNotes', { id: 'N-' + Date.now(), patientId, patient, nurse: user.name || 'Nurse', time: new Date().toLocaleString(), vitals: `BP ${bp}, HR ${hr}`, notes: 'Vitals updated', type: 'Vitals' });
  showToast('Vitals recorded');
  renderNotes();
  renderVitalsPanel();
}

document.getElementById('noteForm').addEventListener('submit', e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const patient = HMSData.find('patients', fd.get('patientId'));
  const user = JSON.parse(sessionStorage.getItem('hms_user') || '{}');
  HMSData.add('nursingNotes', { id: 'N-' + Date.now(), patientId: patient.id, patient: HMSData.getPatientName(patient), nurse: user.name, time: new Date().toLocaleString(), vitals: fd.get('vitals'), notes: fd.get('notes'), type: fd.get('type') });
  document.getElementById('noteModal').classList.remove('active');
  showToast('Nursing note saved');
  renderNotes();
});

document.addEventListener('DOMContentLoaded', () => {
  HMSData.get('patients').forEach(p => { document.getElementById('notePatient').innerHTML += `<option value="${p.id}">${HMSData.getPatientName(p)}</option>`; });
  renderNotes();
  renderVitalsPanel();
});
</script>
</body>
</html>
