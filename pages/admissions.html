<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCore HMS — Admissions</title>
<link rel="stylesheet" href="../css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-icon"><i class="fa-solid fa-hospital-user" style="color:white"></i></div><div><h1>MediCore</h1><span>Hospital Management</span></div></div>
  <nav class="sidebar-nav"></nav>
  <div class="sidebar-footer"><a href="my-profile.html" class="sidebar-user"><img id="sidebarAvatar" src="" alt=""/><div class="user-info"><div class="user-name" id="sidebarName">User</div><div class="user-role" id="sidebarRole">Role</div></div></a></div>
</aside>
<div class="main-content">
  <header class="header">
    <button class="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
    <div class="header-left"><div class="header-title">Patient Admissions</div><div class="header-subtitle">Intake & bed assignment</div></div>
    <div class="header-search"><i class="fa-solid fa-magnifying-glass search-icon"></i><input type="text" id="tableSearch" placeholder="Search admissions..."/></div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
      <a href="my-profile.html"><img id="headerAvatar" class="header-avatar" alt=""/></a>
    </div>
  </header>
  <div class="page-content">
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
      <div class="stat-card"><div class="stat-icon blue"><i class="fa-solid fa-bed"></i></div><div class="stat-info"><div class="stat-value" id="statAdmitted">0</div><div class="stat-label">Currently Admitted</div></div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fa-solid fa-heart-pulse"></i></div><div class="stat-info"><div class="stat-value" id="statCritical">0</div><div class="stat-label">Critical Cases</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fa-solid fa-door-open"></i></div><div class="stat-info"><div class="stat-value" id="statToday">0</div><div class="stat-label">Admitted Today</div></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">Active Admissions</div></div>
        <button class="btn btn-primary btn-sm" data-modal="admitModal"><i class="fa-solid fa-plus"></i> New Admission</button>
      </div>
      <div class="card-body no-pad">
        <div class="table-wrap"><table><thead><tr><th>Patient</th><th>Ward / Room</th><th>Bed</th><th>Diagnosis</th><th>Doctor</th><th>Admitted</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="admissionsBody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="modal-overlay" id="admitModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title"><i class="fa-solid fa-door-open" style="color:var(--primary);margin-right:8px;"></i>Admit Patient</div><button class="modal-close"><i class="fa-solid fa-xmark"></i></button></div>
    <form id="admitForm">
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Patient</label><select class="form-control" name="patientId" id="admitPatient" required></select></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Ward</label><select class="form-control" name="ward"><option>Cardiology Ward</option><option>Neurology Ward</option><option>ICU</option><option>General Ward</option></select></div>
          <div class="form-group"><label class="form-label">Room</label><input type="text" class="form-control" name="room" placeholder="C-204" required/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Bed</label><input type="text" class="form-control" name="bed" placeholder="B2" required/></div>
          <div class="form-group"><label class="form-label">Attending Doctor</label><select class="form-control" name="doctor" id="admitDoctor"></select></div>
        </div>
        <div class="form-group"><label class="form-label">Diagnosis</label><textarea class="form-control" name="diagnosis" rows="2" placeholder="Primary diagnosis..." required></textarea></div>
      </div>
      <div class="modal-footer"><button type="button" class="btn btn-ghost modal-close">Cancel</button><button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Admit Patient</button></div>
    </form>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/app.js"></script>
<script src="../js/main.js"></script>
<script>
function renderAdmissions() {
  const adm = HMSData.get('admissions');
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('statAdmitted').textContent = adm.filter(a => a.status === 'Admitted' || a.status === 'Critical').length;
  document.getElementById('statCritical').textContent = adm.filter(a => a.status === 'Critical').length;
  document.getElementById('statToday').textContent = adm.filter(a => a.admittedOn === today).length;
  document.getElementById('admissionsBody').innerHTML = adm.map(a => `<tr>
    <td><div class="table-avatar"><img src="${HMSData.avatarUrl(a.patient)}" alt=""/><div><div class="name">${a.patient}</div><div class="sub">${a.patientId}</div></div></div></td>
    <td>${a.ward} · ${a.room}</td><td>${a.bed}</td><td>${a.diagnosis}</td><td>${a.doctor}</td>
    <td>${HMSData.formatDate(a.admittedOn)}</td>
    <td><span class="badge ${HMSData.badgeForStatus(a.status)}">${a.status}</span></td>
    <td><a href="discharge.html?id=${a.id}" class="btn btn-outline btn-sm">Discharge</a></td></tr>`).join('');
}
document.getElementById('admitForm').addEventListener('submit', e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const patient = HMSData.find('patients', fd.get('patientId'));
  const id = HMSData.nextId('ADM-', 'admissions');
  HMSData.add('admissions', { id, patientId: patient.id, patient: HMSData.getPatientName(patient), ward: fd.get('ward'), room: fd.get('room'), bed: fd.get('bed'), admittedOn: new Date().toISOString().slice(0, 10), doctor: fd.get('doctor'), diagnosis: fd.get('diagnosis'), status: 'Admitted' });
  HMSData.update('patients', patient.id, { status: 'Admitted' });
  document.getElementById('admitModal').classList.remove('active');
  showToast('Patient admitted successfully');
  renderAdmissions();
});
document.addEventListener('DOMContentLoaded', () => {
  HMSData.get('patients').forEach(p => { document.getElementById('admitPatient').innerHTML += `<option value="${p.id}">${HMSData.getPatientName(p)}</option>`; });
  HMSData.get('doctors').forEach(d => { document.getElementById('admitDoctor').innerHTML += `<option>${d.name}</option>`; });
  renderAdmissions();
});
</script>
</body>
</html>
